name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: [self-hosted, Linux, X64, reverse-pong]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0 run ./game/... ./server/...

      - name: Run gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.22.2 ./game/... ./server/...

      - name: Run tests
        run: go test ./game/... ./server/...

      - name: Build server
        run: go build -ldflags="-s -w" -o /tmp/reverse-pong ./server/

      - name: Build WASM game
        run: GOOS=js GOARCH=wasm go build -ldflags="-s -w" -o /tmp/game.wasm ./game/

      - name: Build Docker image
        run: docker build -t reverse-pong:ci .
